name: X Auto Post

on:
  schedule:
    # 毎日 12:00 JST (03:00 UTC) に投稿
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      text:
        description: "投稿するテキスト（空欄でテンプレからランダム）"
        required: false
        type: string

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r x-auto-post/requirements.txt

      - name: Post to X
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          cd x-auto-post
          if [ -n "${{ inputs.text }}" ]; then
            python post.py --text "${{ inputs.text }}"
          else
            python post.py
          fi
