name: Fetch Trends

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r sns_bot/requirements.txt

      - name: Fetch trends
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m sns_bot.src.trend_fetcher

      - name: Commit trend data
        run: |
          git config user.name "sns-bot"
          git config user.email "bot@users.noreply.github.com"
          git add sns_bot/data/trends_log.json
          git diff --cached --quiet || git commit -m "bot: update trends $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
