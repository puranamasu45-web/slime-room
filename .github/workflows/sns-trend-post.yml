name: Post to X

on:
  schedule:
    - cron: '0 1,7,13 * * *'
  workflow_dispatch:
    inputs:
      keyword_override:
        description: 'Manual keyword to post about (optional)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r sns_bot/requirements.txt

      - name: Generate and post tweet
        env:
          PYTHONPATH: ${{ github.workspace }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.keyword_override }}" ]; then
            ARGS="--keyword=${{ inputs.keyword_override }}"
          fi
          python -m sns_bot.src.x_poster $ARGS

      - name: Commit post log
        run: |
          git config user.name "sns-bot"
          git config user.email "bot@users.noreply.github.com"
          git add sns_bot/data/post_log.json
          git diff --cached --quiet || git commit -m "bot: posted tweet $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
