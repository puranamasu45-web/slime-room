<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Slime Room</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #dffcff, #fff4c9);
      font-family: system-ui, sans-serif;
      color: #23506a;
      overflow: hidden;
    }

    .room {
      text-align: center;
      background: rgba(255,255,255,.75);
      padding: 28px;
      border-radius: 28px;
      box-shadow: 0 18px 50px rgba(60,120,150,.22);
      width: min(90vw, 420px);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
    }

    p {
      margin: 8px 0 20px;
      font-size: 16px;
    }

    .slime {
      width: 170px;
      height: 125px;
      margin: 24px auto 18px;
      border-radius: 50% 50% 42% 42%;
      background:
        radial-gradient(circle at 35% 25%, rgba(255,255,255,.9), transparent 18%),
        linear-gradient(#8bf1ff, #35bde8);
      box-shadow:
        inset 0 -14px 22px rgba(0,100,150,.22),
        0 18px 0 rgba(40,120,160,.14);
      position: relative;
      animation: purun 1.4s infinite ease-in-out;
      cursor: pointer;
      user-select: none;
    }

    .slime::before,
    .slime::after {
      content: "";
      position: absolute;
      top: 48px;
      width: 15px;
      height: 22px;
      border-radius: 50%;
      background: #17465a;
    }

    .slime::before {
      left: 54px;
    }

    .slime::after {
      right: 54px;
    }

    .mouth {
      position: absolute;
      left: 50%;
      top: 78px;
      width: 34px;
      height: 18px;
      transform: translateX(-50%);
      border-bottom: 5px solid #17465a;
      border-radius: 0 0 30px 30px;
    }

    .shadow {
      width: 150px;
      height: 24px;
      margin: 0 auto 18px;
      border-radius: 50%;
      background: rgba(50,100,130,.18);
      animation: shadow 1.4s infinite ease-in-out;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 22px;
      font-size: 16px;
      font-weight: bold;
      background: #35bde8;
      color: white;
      box-shadow: 0 8px 18px rgba(40,120,160,.25);
    }

    button:active {
      transform: translateY(2px);
    }

    .jump {
      animation: jump .45s ease;
    }

    @keyframes purun {
      0%, 100% { transform: scale(1, 1); }
      35% { transform: scale(1.08, .92) translateY(8px); }
      65% { transform: scale(.94, 1.08) translateY(-10px); }
    }

    @keyframes shadow {
      0%, 100% { transform: scale(1); opacity: .18; }
      50% { transform: scale(.82); opacity: .1; }
    }

    @keyframes jump {
      0% { transform: translateY(0) scale(1); }
      45% { transform: translateY(-70px) scale(.95, 1.08); }
      100% { transform: translateY(0) scale(1.08, .92); }
    }
  </style>
</head>
<body>
  <main class="room">
    <h1>Slime Room</h1>
    <p>もちもちスライムが住みはじめました。</p>

    <div id="slime" class="slime">
      <div class="mouth"></div>
    </div>
    <div class="shadow"></div>

    <button id="button">ぷるん！</button>
    <p id="message">タップすると跳ねます。</p>
  </main>

  <script>
    const slime = document.getElementById("slime");
    const button = document.getElementById("button");
    const message = document.getElementById("message");
    let count = 0;

    function purun() {
      count++;
      slime.classList.remove("jump");
      void slime.offsetWidth;
      slime.classList.add("jump");
      message.textContent = `ぷるん！ ${count} 回はねました。`;
    }

    slime.addEventListener("click", purun);
    button.addEventListener("click", purun);
  </script>
</body>
</html>
